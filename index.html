<div id="customAlert" class="custom-alert">

        <h3 id="alertTitle">Success</h3>
        <p id="alertMessage">Payment Successful!</p>
        
        <div class="alert-buttons">
            <button id="okBtn" onclick="closeAlert()">OK</button>
